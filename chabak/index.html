<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>전국 캠핑장 검색 서비스</title>
  <style>
    :root {
      --bg: #f5f6fa;
      --surface: #ffffff;
      --surface-2: #eef2ff;
      --line: #e8eaf3;
      --text: #2a2e3f;
      --muted: #878da3;
      --primary: #6478c9;
      --primary-soft: #dfe7ff;
      --chip: #5f5f63;
      --shadow: 0 16px 40px rgba(53, 63, 102, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 16px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      background: #dfe4f2;
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      color: var(--text);
    }

    .phone-shell {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 0;
    }

    .app {
      position: relative;
      width: 100%;
      max-width: 430px;
      min-height: 100vh;
      background: var(--bg);
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(40, 45, 68, 0.12);
    }

    .screen {
      display: none;
      min-height: 100vh;
      padding-top: calc(12px + var(--safe-top));
      padding-bottom: calc(88px + var(--safe-bottom));
      background: var(--bg);
    }

    .screen.active { display: block; }
    .screen.map-screen { padding: 0 0 calc(32px + var(--safe-bottom)); }
    .screen.detail-screen { padding: 0 0 calc(88px + var(--safe-bottom)); }

    .status-bar {
      height: 28px;
      padding: 0 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--primary);
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: 14px;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-icon {
      width: 16px;
      height: 10px;
      border: 1.8px solid currentColor;
      border-radius: 2px;
      position: relative;
      opacity: 0.8;
    }

    .status-icon::after {
      content: "";
      position: absolute;
      top: 2px;
      right: -3px;
      width: 2px;
      height: 4px;
      border-radius: 0 2px 2px 0;
      background: currentColor;
    }

    .signal, .wifi {
      width: 16px;
      height: 12px;
      position: relative;
      display: inline-block;
    }

    .signal::before {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 10px;
      background:
        linear-gradient(to top, currentColor 100%, transparent 0) 0 100%/2px 4px no-repeat,
        linear-gradient(to top, currentColor 100%, transparent 0) 4px 100%/2px 6px no-repeat,
        linear-gradient(to top, currentColor 100%, transparent 0) 8px 100%/2px 8px no-repeat,
        linear-gradient(to top, currentColor 100%, transparent 0) 12px 100%/2px 10px no-repeat;
      opacity: 0.9;
    }

    .wifi::before {
      content: "";
      position: absolute;
      left: 1px;
      top: 0;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-color: currentColor transparent transparent transparent;
      border-radius: 50%;
      transform: rotate(45deg);
      opacity: 0.75;
    }

    .page {
      padding: 0 24px;
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .search-box {
      flex: 1;
      height: 42px;
      background: #c6cde7;
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
    }

    .search-box input {
      flex: 1;
      border: 0;
      outline: none;
      background: transparent;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
    }

    .search-box input::placeholder { color: rgba(255,255,255,0.85); }

    .icon-btn {
      border: 0;
      background: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      color: var(--primary);
    }

    .icon-map {
      width: 22px;
      height: 22px;
      border: 2px solid currentColor;
      border-radius: 3px;
      position: relative;
    }

    .icon-map::before,
    .icon-map::after {
      content: "";
      position: absolute;
      top: -2px;
      bottom: -2px;
      width: 2px;
      background: currentColor;
      opacity: 0.7;
    }
    .icon-map::before { left: 6px; }
    .icon-map::after { right: 6px; }

    .icon-search {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.85);
      border-radius: 50%;
      position: relative;
      flex: 0 0 auto;
    }
    .icon-search::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 2px;
      background: rgba(255,255,255,0.85);
      right: -6px;
      bottom: -1px;
      transform: rotate(45deg);
      border-radius: 4px;
    }

    .section-title {
      margin: 34px 0 14px;
      color: var(--primary);
      font-size: 16px;
      font-weight: 700;
    }

    .chips { display: flex; gap: 14px; flex-wrap: wrap; }
    .chip {
      border: 0;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      color: #fff;
      background: var(--chip);
    }
    .chip.light { background: #9eadde; }

    .hero {
      margin: 34px -24px 0;
      position: relative;
      height: 360px;
      background:
        linear-gradient(rgba(176, 201, 255, 0.35), rgba(176, 201, 255, 0.2)),
        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1200&q=80') center/cover no-repeat;
      overflow: hidden;
    }

    .hero-copy {
      position: absolute;
      top: 72px;
      width: 100%;
      text-align: center;
      color: #5571c3;
      font-weight: 800;
      font-size: 24px;
      line-height: 1.35;
      text-shadow: 0 2px 10px rgba(255,255,255,0.25);
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto 0 0 0;
      height: 90px;
      background: linear-gradient(to top, rgba(0,0,0,0.10), transparent);
    }

    .list-wrap {
      padding: 0 24px;
    }

    .list-head { margin-top: 12px; }
    .result-summary {
      margin: 12px 0 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .camp-list {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .camp-card {
      display: grid;
      grid-template-columns: 130px 1fr;
      gap: 14px;
      align-items: start;
      cursor: pointer;
    }

    .thumb {
      width: 130px;
      height: 130px;
      border-radius: 14px;
      background: linear-gradient(135deg, #d3dbf4, #b9c9ef);
      object-fit: cover;
      box-shadow: var(--shadow);
    }

    .camp-name {
      font-size: 17px;
      line-height: 1.35;
      font-weight: 800;
      margin: 2px 0 6px;
      letter-spacing: -0.02em;
    }

    .camp-addr {
      font-size: 14px;
      color: #5f6375;
      line-height: 1.45;
      min-height: 40px;
    }

    .camp-meta {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      color: #9b9eab;
      font-size: 13px;
      font-weight: 600;
    }

    .bookmark {
      width: 14px;
      height: 18px;
      border: 2px solid #b4b7c3;
      border-bottom-left-radius: 2px;
      border-bottom-right-radius: 2px;
      clip-path: polygon(0 0,100% 0,100% 100%,50% 76%,0 100%);
      opacity: 0.8;
      margin-bottom: 8px;
    }

    .meta-left { display: flex; flex-direction: column; gap: 8px; }
    .meta-row { display: flex; gap: 10px; align-items: center; }
    .distance { white-space: nowrap; font-size: 14px; }

    .map-screen .map-header,
    .detail-header {
      position: absolute;
      z-index: 3;
      top: calc(12px + var(--safe-top));
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      pointer-events: none;
    }

    .back-btn,
    .ghost-btn {
      width: 36px;
      height: 36px;
      border: 0;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      box-shadow: 0 8px 20px rgba(52,60,98,0.16);
      display: grid;
      place-items: center;
      color: #4f67b6;
      cursor: pointer;
      pointer-events: auto;
    }

    .arrow-left {
      width: 12px;
      height: 12px;
      border-left: 2px solid currentColor;
      border-bottom: 2px solid currentColor;
      transform: rotate(45deg);
      margin-left: 4px;
    }

    #map {
      width: 100%;
      height: calc(100vh - var(--safe-bottom));
      min-height: 720px;
      background: #dce6f7;
    }

    .sheet {
      position: absolute;
      left: 16px;
      right: 16px;
      bottom: calc(18px + var(--safe-bottom));
      z-index: 3;
      background: rgba(255,255,255,0.97);
      border-radius: 22px 22px 0 0;
      padding: 18px 18px 20px;
      box-shadow: 0 18px 40px rgba(30, 40, 76, 0.18);
      display: none;
    }

    .sheet.active { display: block; }
    .sheet-inner {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 14px;
      align-items: start;
    }
    .sheet-thumb {
      width: 110px;
      height: 96px;
      border-radius: 12px;
      object-fit: cover;
      background: linear-gradient(135deg, #d3dbf4, #b9c9ef);
    }
    .sheet-title {
      margin: 2px 0 8px;
      font-size: 16px;
      font-weight: 800;
      line-height: 1.35;
    }
    .sheet-addr {
      font-size: 12px;
      line-height: 1.45;
      color: #666b80;
      margin-bottom: 14px;
    }
    .sheet-link {
      color: #9ca3b9;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .detail-hero {
      position: relative;
      height: 470px;
      overflow: hidden;
      background: #c7d4ef;
    }

    .detail-hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .detail-panel {
      position: relative;
      margin-top: -1px;
      background: var(--bg);
      border-radius: 0;
      padding: 18px 24px 0;
    }

    .detail-name {
      font-size: 18px;
      line-height: 1.35;
      margin: 0 0 4px;
      color: #5671c5;
      font-weight: 800;
    }

    .detail-addr {
      margin: 0 0 18px;
      color: #667089;
      font-size: 14px;
      line-height: 1.5;
    }

    .detail-link-row {
      display: flex;
      flex-direction: column;
      gap: 18px;
      margin-bottom: 24px;
    }

    .link-action {
      border: 0;
      background: none;
      padding: 0;
      margin: 0;
      color: #5570c3;
      font-size: 18px;
      font-weight: 800;
      text-align: left;
      cursor: pointer;
    }

    .gallery-title {
      margin: 8px 0 16px;
      font-size: 16px;
      font-weight: 800;
      color: #4c5063;
    }

    .gallery {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding-bottom: 20px;
    }

    .gallery img,
    .gallery .photo-fallback {
      width: 100%;
      height: 120px;
      border-radius: 12px;
      object-fit: cover;
      background: linear-gradient(135deg, #d7def5, #becbee);
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .info-box {
      background: var(--surface);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 8px 18px rgba(85, 100, 140, 0.08);
    }

    .info-label {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .info-value {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.45;
      color: #444b60;
      word-break: keep-all;
    }

    .floating-handle {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(8px + var(--safe-bottom));
      width: 132px;
      height: 5px;
      border-radius: 99px;
      background: #5570c3;
      opacity: 0.9;
      z-index: 4;
    }

    .tabbar {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 0;
      width: 100%;
      max-width: 430px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(90, 99, 140, 0.08);
      z-index: 10;
      padding: 10px 16px calc(14px + var(--safe-bottom));
      display: flex;
      justify-content: space-around;
    }

    .tab-item {
      color: #b8b8be;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      min-width: 52px;
      cursor: pointer;
    }

    .tab-item.active { color: #5b73c8; }
    .tab-icon {
      width: 22px;
      height: 22px;
      position: relative;
      opacity: 0.9;
    }
    .tab-home::before { content: "⌂"; font-size: 22px; position: absolute; inset: 0; text-align: center; line-height: 22px; }
    .tab-search::before {
      content: "";
      position: absolute;
      left: 2px;
      top: 2px;
      width: 12px;
      height: 12px;
      border: 2px solid currentColor;
      border-radius: 50%;
    }
    .tab-search::after {
      content: "";
      position: absolute;
      width: 8px;
      height: 2px;
      background: currentColor;
      right: 0;
      bottom: 2px;
      transform: rotate(45deg);
      border-radius: 3px;
    }
    .tab-grid::before { content: "⌘"; font-size: 20px; position: absolute; inset: 0; text-align: center; line-height: 22px; }
    .tab-play::before { content: "▻"; font-size: 20px; position: absolute; inset: 0; text-align: center; line-height: 20px; }
    .tab-user::before { content: "◯"; font-size: 19px; position: absolute; inset: 0; text-align: center; line-height: 20px; }

    .empty-state,
    .loading,
    .error-box {
      background: var(--surface);
      border-radius: 18px;
      padding: 18px;
      color: #5f657a;
      font-size: 14px;
      line-height: 1.6;
      box-shadow: 0 10px 22px rgba(79, 91, 129, 0.08);
    }

    .helper-row {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .helper-btn {
      border: 0;
      background: var(--primary-soft);
      color: var(--primary);
      font-weight: 700;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
    }

    .notice {
      margin-top: 16px;
      font-size: 12px;
      color: #8d94ab;
      line-height: 1.55;
    }

    .hidden { display: none !important; }

    @media (min-width: 431px) {
      .phone-shell { padding: 24px 0; }
      .app { min-height: 820px; border-radius: 34px; }
      .tabbar { bottom: 24px; border-radius: 0 0 34px 34px; }
      .screen, .screen.map-screen, .screen.detail-screen { min-height: 820px; }
      #map { min-height: 820px; height: 820px; }
    }
  </style>
</head>
<body>
  <div class="phone-shell">
    <div class="app">
      <section class="screen active" id="search-screen">
        <div class="status-bar">
          <div>9:41</div>
          <div class="status-icons">
            <span class="signal"></span>
            <span class="wifi"></span>
            <span class="status-icon"></span>
          </div>
        </div>

        <div class="page">
          <div class="search-row">
            <div class="search-box">
              <span class="icon-search"></span>
              <input id="search-input" type="text" placeholder="지역 또는 키워드를 검색해주세요" />
            </div>
            <button class="icon-btn" id="quick-map-open" aria-label="지도 열기">
              <span class="icon-map"></span>
            </button>
          </div>

          <h2 class="section-title">최근 검색어</h2>
          <div class="chips" id="recent-chips"></div>

          <h2 class="section-title">인기 키워드</h2>
          <div class="chips">
            <button class="chip light" data-keyword="오토캠핑">오토캠핑</button>
            <button class="chip light" data-keyword="차박">차박</button>
            <button class="chip light" data-keyword="강화도">강화도</button>
            <button class="chip light" data-keyword="카라반">카라반</button>
          </div>

          <div class="hero">
            <div class="hero-copy">전국 캠핑장 검색<br />원하는 장소를 찾아보세요</div>
          </div>
        </div>
      </section>

      <section class="screen" id="list-screen">
        <div class="status-bar">
          <div>9:41</div>
          <div class="status-icons">
            <span class="signal"></span>
            <span class="wifi"></span>
            <span class="status-icon"></span>
          </div>
        </div>

        <div class="list-wrap">
          <div class="search-row list-head">
            <div class="search-box">
              <span class="icon-search"></span>
              <input id="list-search-input" type="text" placeholder="지역 또는 키워드를 검색해주세요" />
            </div>
            <button class="icon-btn" id="open-map-from-list" aria-label="지도 보기">
              <span class="icon-map"></span>
            </button>
          </div>

          <div class="result-summary" id="result-summary">검색 결과를 불러오는 중...</div>
          <div id="list-feedback" class="loading">검색 결과를 불러오는 중입니다.</div>
          <div class="camp-list" id="camp-list"></div>
        </div>
      </section>

      <section class="screen map-screen" id="map-screen">
        <div class="status-bar" style="position:absolute; z-index:3; top: calc(0px + var(--safe-top)); left:0; right:0; color:#5d78c8;">
          <div style="padding-left:22px;">9:41</div>
          <div class="status-icons" style="padding-right:22px;">
            <span class="signal"></span>
            <span class="wifi"></span>
            <span class="status-icon"></span>
          </div>
        </div>
        <div class="map-header">
          <button class="back-btn" id="back-from-map" aria-label="뒤로가기"><span class="arrow-left"></span></button>
          <button class="ghost-btn" id="focus-selected" aria-label="선택 위치로 이동">◎</button>
        </div>
        <div id="map"></div>
        <div class="sheet" id="bottom-sheet">
          <div class="sheet-inner">
            <img id="sheet-image" class="sheet-thumb" alt="캠핑장 이미지" />
            <div>
              <div class="sheet-title" id="sheet-title"></div>
              <div class="sheet-addr" id="sheet-addr"></div>
              <a href="#" class="sheet-link" id="sheet-detail-link">상세 정보 보기</a>
            </div>
          </div>
        </div>
        <div class="floating-handle"></div>
      </section>

      <section class="screen detail-screen" id="detail-screen">
        <div class="detail-header">
          <button class="back-btn" id="back-from-detail" aria-label="뒤로가기"><span class="arrow-left"></span></button>
        </div>
        <div class="status-bar" style="position:absolute; z-index:3; top: calc(0px + var(--safe-top)); left:0; right:0; color:#5d78c8;">
          <div style="padding-left:22px;">9:41</div>
          <div class="status-icons" style="padding-right:22px;">
            <span class="signal"></span>
            <span class="wifi"></span>
            <span class="status-icon"></span>
          </div>
        </div>
        <div class="detail-hero">
          <img id="detail-hero-image" alt="캠핑장 대표 이미지" />
        </div>
        <div class="detail-panel">
          <h1 class="detail-name" id="detail-name"></h1>
          <p class="detail-addr" id="detail-addr"></p>

          <div class="detail-link-row">
            <button class="link-action" id="go-booking-btn">예약/홈페이지 보기 ▶</button>
            <button class="link-action" id="toggle-facility-btn">편의시설 보기 ▼</button>
          </div>

          <div class="info-grid hidden" id="facility-panel"></div>

          <h3 class="gallery-title">캠핑장 사진</h3>
          <div class="gallery" id="detail-gallery"></div>

          <p class="notice" id="detail-notice"></p>
        </div>
      </section>

      <nav class="tabbar">
        <div class="tab-item" data-screen="search-screen"><span class="tab-icon tab-home"></span><span>홈</span></div>
        <div class="tab-item active" data-screen="search-screen"><span class="tab-icon tab-search"></span><span>검색</span></div>
        <div class="tab-item"><span class="tab-icon tab-grid"></span><span>모임</span></div>
        <div class="tab-item"><span class="tab-icon tab-play"></span><span>라이브</span></div>
        <div class="tab-item"><span class="tab-icon tab-user"></span><span>My</span></div>
      </nav>
    </div>
  </div>

  <script>
    /*
      ==========================
      여기에 API KEY를 넣어주세요.
      ==========================
    */
    const GOCAMPING_SERVICE_KEY = "7fb32307d1084916efd402f8c7df555b7c616c5148ff08a6ca84f0d350bd4572";
    const KAKAO_JAVASCRIPT_KEY = "e863a55497769d28bf4f9b55634187ff";

    const API_BASE = "https://apis.data.go.kr/B551011/GoCamping";
    const APP_NAME = "CampingSearchApp";
    const RECENT_KEY = "gocamping_recent_keywords";
    const FALLBACK_IMAGE = "data:image/svg+xml;utf8," + encodeURIComponent(`
      <svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#dce4fa"/>
            <stop offset="100%" stop-color="#bccaf0"/>
          </linearGradient>
        </defs>
        <rect width="800" height="600" fill="url(#g)"/>
        <g fill="#6b7ec8" opacity="0.9">
          <path d="M220 420h360v24H220z"/>
          <path d="M270 420l110-170 110 170H270z"/>
          <path d="M500 420l60-90 60 90h-120z" opacity="0.75"/>
          <circle cx="600" cy="160" r="46" opacity="0.45"/>
        </g>
      </svg>
    `);

    const state = {
      currentScreen: "search-screen",
      results: [],
      selected: null,
      markers: [],
      map: null,
      mapLoaded: false,
      mapLoadPromise: null,
      lastKeyword: "",
      historyStack: ["search-screen"],
    };

    const el = {
      searchScreen: document.getElementById("search-screen"),
      listScreen: document.getElementById("list-screen"),
      mapScreen: document.getElementById("map-screen"),
      detailScreen: document.getElementById("detail-screen"),
      searchInput: document.getElementById("search-input"),
      listSearchInput: document.getElementById("list-search-input"),
      recentChips: document.getElementById("recent-chips"),
      campList: document.getElementById("camp-list"),
      listFeedback: document.getElementById("list-feedback"),
      resultSummary: document.getElementById("result-summary"),
      bottomSheet: document.getElementById("bottom-sheet"),
      sheetImage: document.getElementById("sheet-image"),
      sheetTitle: document.getElementById("sheet-title"),
      sheetAddr: document.getElementById("sheet-addr"),
      sheetDetailLink: document.getElementById("sheet-detail-link"),
      detailHeroImage: document.getElementById("detail-hero-image"),
      detailName: document.getElementById("detail-name"),
      detailAddr: document.getElementById("detail-addr"),
      detailGallery: document.getElementById("detail-gallery"),
      detailNotice: document.getElementById("detail-notice"),
      facilityPanel: document.getElementById("facility-panel"),
      goBookingBtn: document.getElementById("go-booking-btn"),
      toggleFacilityBtn: document.getElementById("toggle-facility-btn"),
    };

    function normalizeImage(src) {
      if (!src || typeof src !== "string") return FALLBACK_IMAGE;
      return src.trim() || FALLBACK_IMAGE;
    }

    function safeText(text, fallback = "정보 없음") {
      if (text === null || text === undefined || text === "") return fallback;
      return String(text);
    }

    function formatDistance(item) {
      if (!item || !navigator.geolocation || item.distanceKm == null) return "거리 정보 없음";
      return `${item.distanceKm.toFixed(1)}Km`;
    }

    function readRecentKeywords() {
      try {
        return JSON.parse(localStorage.getItem(RECENT_KEY) || "[]");
      } catch (e) {
        return [];
      }
    }

    function saveRecentKeyword(keyword) {
      const trimmed = keyword.trim();
      if (!trimmed) return;
      const next = [trimmed, ...readRecentKeywords().filter(item => item !== trimmed)].slice(0, 8);
      localStorage.setItem(RECENT_KEY, JSON.stringify(next));
      renderRecentKeywords();
    }

    function renderRecentKeywords() {
      const keywords = readRecentKeywords();
      if (!keywords.length) {
        el.recentChips.innerHTML = `<div class="empty-state" style="padding:14px 16px; border-radius:14px; width:100%;">최근 검색어가 아직 없습니다.</div>`;
        return;
      }

      el.recentChips.innerHTML = keywords.map(keyword => (
        `<button class="chip" data-keyword="${escapeHtml(keyword)}">${escapeHtml(keyword)}</button>`
      )).join("");
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function setActiveTab(screenId) {
      document.querySelectorAll('.tab-item').forEach((tab, index) => {
        if (index >= 2) return;
        tab.classList.toggle('active', tab.dataset.screen === screenId || (screenId !== 'search-screen' && tab.dataset.screen === undefined));
      });
      const tabs = document.querySelectorAll('.tab-item');
      if (tabs[1]) tabs[1].classList.add('active');
      if (screenId === 'search-screen') {
        tabs[0].classList.remove('active');
      }
    }

    function showScreen(screenId, push = true) {
      document.querySelectorAll('.screen').forEach(screen => screen.classList.remove('active'));
      const target = document.getElementById(screenId);
      if (target) target.classList.add('active');
      state.currentScreen = screenId;
      setActiveTab(screenId);

      if (push) {
        const last = state.historyStack[state.historyStack.length - 1];
        if (last !== screenId) state.historyStack.push(screenId);
      }

      if (screenId === 'map-screen' && state.map && window.kakao?.maps) {
        setTimeout(() => {
          window.kakao.maps.event.trigger(state.map, 'resize');
          if (state.selected) focusItemOnMap(state.selected);
        }, 100);
      }
    }

    function goBack(fallback = 'search-screen') {
      if (state.historyStack.length > 1) {
        state.historyStack.pop();
        showScreen(state.historyStack[state.historyStack.length - 1], false);
      } else {
        showScreen(fallback, false);
      }
    }

    async function searchCamping(keyword) {
      const trimmed = keyword.trim();
      if (!trimmed) {
        alert('검색어를 입력해주세요.');
        return;
      }

      if (GOCAMPING_SERVICE_KEY === 'YOUR_GOCAMPING_SERVICE_KEY') {
        showScreen('list-screen');
        el.listFeedback.className = 'error-box';
        el.listFeedback.innerHTML = '고캠핑 서비스키가 비어 있습니다.<br>파일 상단의 <strong>GOCAMPING_SERVICE_KEY</strong> 값을 먼저 넣어주세요.';
        el.campList.innerHTML = '';
        el.resultSummary.textContent = 'API 키 확인 필요';
        return;
      }

      saveRecentKeyword(trimmed);
      state.lastKeyword = trimmed;
      el.searchInput.value = trimmed;
      el.listSearchInput.value = trimmed;
      showScreen('list-screen');
      renderLoading();

      try {
        const items = await fetchCampingData(trimmed);
        state.results = await enrichDistances(items);
        renderList(trimmed, state.results);
      } catch (error) {
        console.error(error);
        el.listFeedback.className = 'error-box';
        el.listFeedback.innerHTML = '검색 결과를 불러오지 못했습니다.<br>서비스키, 호출 URL, 또는 브라우저 네트워크 상태를 확인해주세요.';
        el.campList.innerHTML = '';
        el.resultSummary.textContent = '검색 실패';
      }
    }

    function renderLoading() {
      el.resultSummary.textContent = '검색 중...';
      el.campList.innerHTML = '';
      el.listFeedback.className = 'loading';
      el.listFeedback.textContent = '검색 결과를 불러오는 중입니다.';
    }

    async function fetchCampingData(keyword) {
      const url = new URL(`${API_BASE}/searchList`);
      url.searchParams.set('serviceKey', GOCAMPING_SERVICE_KEY);
      url.searchParams.set('MobileOS', 'ETC');
      url.searchParams.set('MobileApp', APP_NAME);
      url.searchParams.set('_type', 'json');
      url.searchParams.set('numOfRows', '60');
      url.searchParams.set('pageNo', '1');
      url.searchParams.set('keyword', keyword);

      const response = await fetch(url.toString());
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      const items = data?.response?.body?.items?.item || [];
      return Array.isArray(items) ? items : [items].filter(Boolean);
    }

    async function enrichDistances(items) {
      const userPosition = await getUserPosition().catch(() => null);
      return items.map(item => {
        const normalized = normalizeCampingItem(item);
        if (userPosition && normalized.mapY && normalized.mapX) {
          normalized.distanceKm = calculateDistanceKm(
            userPosition.latitude,
            userPosition.longitude,
            Number(normalized.mapY),
            Number(normalized.mapX)
          );
        } else {
          normalized.distanceKm = null;
        }
        return normalized;
      }).sort((a, b) => {
        if (a.distanceKm == null && b.distanceKm == null) return 0;
        if (a.distanceKm == null) return 1;
        if (b.distanceKm == null) return -1;
        return a.distanceKm - b.distanceKm;
      });
    }

    function normalizeCampingItem(item) {
      return {
        contentId: safeText(item.contentId, crypto.randomUUID()),
        facltNm: safeText(item.facltNm),
        addr1: safeText(item.addr1),
        addr2: safeText(item.addr2, ''),
        doNm: safeText(item.doNm, ''),
        sigunguNm: safeText(item.sigunguNm, ''),
        induty: safeText(item.induty, '일반야영장'),
        lctCl: safeText(item.lctCl, '입지 정보 없음'),
        lineIntro: safeText(item.lineIntro, ''),
        intro: safeText(item.intro, '소개 정보 없음'),
        sbrsCl: safeText(item.sbrsCl, '편의시설 정보 없음'),
        homepage: safeText(item.homepage, ''),
        resveUrl: safeText(item.resveUrl, ''),
        resveCl: safeText(item.resveCl, ''),
        mapX: item.mapX ? Number(item.mapX) : null,
        mapY: item.mapY ? Number(item.mapY) : null,
        firstImageUrl: normalizeImage(item.firstImageUrl),
        createdtime: safeText(item.createdtime, ''),
        toiletCo: safeText(item.toiletCo, '-'),
        swrmCo: safeText(item.swrmCo, '-'),
        wtrplCo: safeText(item.wtrplCo, '-'),
        brazierCl: safeText(item.brazierCl, '-'),
        animalCmgCl: safeText(item.animalCmgCl, '-'),
        caravAcmpnyAt: safeText(item.caravAcmpnyAt, '-'),
        trlerAcmpnyAt: safeText(item.trlerAcmpnyAt, '-'),
        posblFcltyCl: safeText(item.posblFcltyCl, '-'),
        siteBottomCl1: safeText(item.siteBottomCl1, '0'),
        siteBottomCl2: safeText(item.siteBottomCl2, '0'),
        siteBottomCl3: safeText(item.siteBottomCl3, '0'),
        siteBottomCl4: safeText(item.siteBottomCl4, '0'),
        siteBottomCl5: safeText(item.siteBottomCl5, '0'),
      };
    }

    function renderList(keyword, items) {
      el.resultSummary.textContent = `"${keyword}" 검색 결과 ${items.length}건`;

      if (!items.length) {
        el.listFeedback.className = 'empty-state';
        el.listFeedback.innerHTML = `검색 결과가 없습니다.<br>다른 지역명이나 키워드로 다시 검색해주세요.`;
        el.campList.innerHTML = '';
        return;
      }

      el.listFeedback.className = 'hidden';
      el.listFeedback.textContent = '';
      el.campList.innerHTML = items.map(item => `
        <article class="camp-card" data-id="${escapeHtml(item.contentId)}">
          <img class="thumb" src="${escapeHtml(item.firstImageUrl)}" alt="${escapeHtml(item.facltNm)}" loading="lazy" onerror="this.src='${FALLBACK_IMAGE}'" />
          <div>
            <h3 class="camp-name">${escapeHtml(item.facltNm)}</h3>
            <div class="camp-addr">${escapeHtml(item.addr1)}${item.addr2 ? `<br>${escapeHtml(item.addr2)}` : ''}</div>
            <div class="camp-meta">
              <div class="meta-left">
                <div class="bookmark"></div>
                <div>${escapeHtml(item.induty)}</div>
              </div>
              <div class="distance">${escapeHtml(formatDistance(item))}</div>
            </div>
          </div>
        </article>
      `).join('');
    }

    function getItemById(id) {
      return state.results.find(item => item.contentId === id) || null;
    }

    function ensureKakaoMap() {
      if (window.kakao?.maps) return Promise.resolve();
      if (KAKAO_JAVASCRIPT_KEY === 'YOUR_KAKAO_JAVASCRIPT_KEY') {
        return Promise.reject(new Error('Kakao JavaScript key missing'));
      }
      if (state.mapLoadPromise) return state.mapLoadPromise;

      state.mapLoadPromise = new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_JAVASCRIPT_KEY}&autoload=false`;
        script.onload = () => window.kakao.maps.load(resolve);
        script.onerror = reject;
        document.head.appendChild(script);
      });

      return state.mapLoadPromise;
    }

    async function openMapWithResults(selectedId = null) {
      if (!state.results.length) {
        alert('먼저 검색 결과를 불러와주세요.');
        return;
      }

      try {
        await ensureKakaoMap();
      } catch (error) {
        console.error(error);
        alert('카카오맵 키를 확인해주세요. KAKAO_JAVASCRIPT_KEY 값이 필요합니다.');
        return;
      }

      showScreen('map-screen');
      initOrUpdateMap(selectedId);
    }

    function initOrUpdateMap(selectedId = null) {
      const firstWithCoord = state.results.find(item => item.mapX && item.mapY);
      const base = firstWithCoord || state.results[0];
      const center = new kakao.maps.LatLng(base.mapY || 37.5665, base.mapX || 126.9780);

      if (!state.map) {
        state.map = new kakao.maps.Map(document.getElementById('map'), {
          center,
          level: 9,
        });
      } else {
        state.map.setCenter(center);
      }

      clearMarkers();
      const bounds = new kakao.maps.LatLngBounds();

      state.results.forEach(item => {
        if (!item.mapX || !item.mapY) return;
        const position = new kakao.maps.LatLng(item.mapY, item.mapX);
        const marker = new kakao.maps.Marker({ position, map: state.map });
        marker.__itemId = item.contentId;
        state.markers.push(marker);
        bounds.extend(position);
        kakao.maps.event.addListener(marker, 'click', () => selectCamp(item.contentId, true));
      });

      if (!bounds.isEmpty()) {
        state.map.setBounds(bounds, 60, 60, 60, 60);
      }

      const targetId = selectedId || state.selected?.contentId || state.results[0]?.contentId;
      if (targetId) selectCamp(targetId, true);
    }

    function clearMarkers() {
      state.markers.forEach(marker => marker.setMap(null));
      state.markers = [];
    }

    function selectCamp(id, fromMap = false) {
      const item = getItemById(id);
      if (!item) return;
      state.selected = item;
      renderBottomSheet(item);
      if (state.currentScreen === 'map-screen' && (fromMap || item.mapX && item.mapY)) {
        focusItemOnMap(item);
      }
    }

    function focusItemOnMap(item) {
      if (!state.map || !item?.mapX || !item?.mapY || !window.kakao?.maps) return;
      const center = new kakao.maps.LatLng(item.mapY, item.mapX);
      state.map.panTo(center);
      state.map.setLevel(5);
    }

    function renderBottomSheet(item) {
      el.bottomSheet.classList.add('active');
      el.sheetImage.src = item.firstImageUrl;
      el.sheetImage.onerror = () => { el.sheetImage.src = FALLBACK_IMAGE; };
      el.sheetTitle.textContent = item.facltNm;
      el.sheetAddr.textContent = item.addr1;
      el.sheetDetailLink.onclick = (e) => {
        e.preventDefault();
        openDetail(item.contentId);
      };
    }

    function buildGalleryImages(item) {
      const gallery = [item.firstImageUrl];
      return gallery.filter(Boolean);
    }

    function renderFacilities(item) {
      const info = [
        ['업종', item.induty],
        ['입지', item.lctCl],
        ['편의시설', item.sbrsCl],
        ['주변시설', item.posblFcltyCl],
        ['화장실', item.toiletCo],
        ['샤워실', item.swrmCo],
        ['개수대', item.wtrplCo],
        ['화로대', item.brazierCl],
        ['반려동물', item.animalCmgCl],
        ['카라반 동반', item.caravAcmpnyAt],
        ['트레일러 동반', item.trlerAcmpnyAt],
        ['예약 방식', item.resveCl || '정보 없음'],
      ];

      el.facilityPanel.innerHTML = info.map(([label, value]) => `
        <div class="info-box">
          <div class="info-label">${escapeHtml(label)}</div>
          <div class="info-value">${escapeHtml(value || '정보 없음')}</div>
        </div>
      `).join('');
    }

    function openDetail(id) {
      const item = getItemById(id);
      if (!item) return;
      state.selected = item;

      el.detailHeroImage.src = item.firstImageUrl;
      el.detailHeroImage.onerror = () => { el.detailHeroImage.src = FALLBACK_IMAGE; };
      el.detailName.textContent = item.facltNm;
      el.detailAddr.textContent = `${item.addr1}${item.addr2 ? ' ' + item.addr2 : ''}`;
      renderFacilities(item);

      const photos = buildGalleryImages(item);
      el.detailGallery.innerHTML = photos.length
        ? photos.map(src => `<img src="${escapeHtml(src)}" alt="${escapeHtml(item.facltNm)} 사진" onerror="this.src='${FALLBACK_IMAGE}'" />`).join('') +
          `<div class="photo-fallback"></div><div class="photo-fallback"></div><div class="photo-fallback"></div>`
        : `<div class="photo-fallback"></div><div class="photo-fallback"></div><div class="photo-fallback"></div><div class="photo-fallback"></div>`;

      el.detailNotice.textContent = item.lineIntro && item.lineIntro !== '정보 없음'
        ? item.lineIntro
        : item.intro;

      el.goBookingBtn.onclick = () => {
        const url = item.resveUrl || item.homepage;
        if (!url || url === '정보 없음') {
          alert('연결 가능한 예약/홈페이지 정보가 없습니다.');
          return;
        }
        window.open(url, '_blank', 'noopener');
      };

      el.toggleFacilityBtn.onclick = () => {
        el.facilityPanel.classList.toggle('hidden');
        el.toggleFacilityBtn.textContent = el.facilityPanel.classList.contains('hidden')
          ? '편의시설 보기 ▼'
          : '편의시설 닫기 ▲';
      };

      el.facilityPanel.classList.add('hidden');
      el.toggleFacilityBtn.textContent = '편의시설 보기 ▼';
      showScreen('detail-screen');
    }

    function getUserPosition() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) return reject(new Error('geolocation unsupported'));
        navigator.geolocation.getCurrentPosition(
          pos => resolve({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }),
          reject,
          { enableHighAccuracy: true, timeout: 6000, maximumAge: 600000 }
        );
      });
    }

    function calculateDistanceKm(lat1, lon1, lat2, lon2) {
      const toRad = deg => deg * Math.PI / 180;
      const R = 6371;
      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon / 2) ** 2;
      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      return R * c;
    }

    function bindEvents() {
      el.searchInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') searchCamping(e.target.value);
      });

      el.listSearchInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') searchCamping(e.target.value);
      });

      document.body.addEventListener('click', e => {
        const keywordButton = e.target.closest('[data-keyword]');
        if (keywordButton) {
          searchCamping(keywordButton.dataset.keyword);
          return;
        }

        const card = e.target.closest('.camp-card');
        if (card) {
          selectCamp(card.dataset.id);
          openMapWithResults(card.dataset.id);
        }
      });

      document.getElementById('quick-map-open').addEventListener('click', () => {
        if (state.results.length) openMapWithResults(state.selected?.contentId || state.results[0]?.contentId);
        else alert('먼저 검색 후 지도 보기를 이용해주세요.');
      });

      document.getElementById('open-map-from-list').addEventListener('click', () => {
        openMapWithResults(state.selected?.contentId || state.results[0]?.contentId);
      });

      document.getElementById('back-from-map').addEventListener('click', () => goBack('list-screen'));
      document.getElementById('back-from-detail').addEventListener('click', () => goBack('map-screen'));
      document.getElementById('focus-selected').addEventListener('click', () => {
        if (state.selected) focusItemOnMap(state.selected);
      });

      document.querySelectorAll('.tab-item[data-screen]').forEach(tab => {
        tab.addEventListener('click', () => showScreen(tab.dataset.screen));
      });
    }

    function init() {
      renderRecentKeywords();
      bindEvents();
      showScreen('search-screen', false);
    }

    init();
  </script>
</body>
</html>
