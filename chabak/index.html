<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>캠핑장 검색 서비스</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=e863a55497769d28bf4f9b55634187ff"></script>
    
    <style>
        /* [공통 초기화] */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f0f0f0; display: flex; justify-content: center; height: 100vh; height: 100dvh; overflow: hidden; }
        
        #app {
            width: 100%; max-width: 440px; height: 100%;
            background-color: #fff; position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.1); overflow: hidden;
        }

        /* [화면 전환 애니메이션] */
        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; display: flex; flex-direction: column;
            transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1); z-index: 10;
        }
        .screen.base-screen { transform: translateX(0); z-index: 5; }
        .screen.active { transform: translateX(0); z-index: 15; box-shadow: -5px 0 15px rgba(0,0,0,0.05); }

        /* [스크롤 및 레이아웃] */
        .scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; }
        .scroll-area::-webkit-scrollbar { display: none; }
        .has-header { padding-top: 70px; }
        .has-nav { padding-bottom: 80px; }

        /* [헤더 및 검색바] - Form 태그로 변경됨 */
        #common-header {
            position: absolute; top: 0; left: 0; width: 100%; z-index: 20;
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(5px);
            transition: opacity 0.3s ease, visibility 0.3s;
        }
        .header-search { padding: 15px 20px; display: flex; align-items: center; gap: 12px; }
        .search-box {
            flex: 1; background-color: #f0f2f8; border-radius: 12px;
            display: flex; align-items: center; padding: 12px 15px; margin: 0; border: none;
        }
        .search-box input { 
            border: none; background: none; outline: none; width: 100%; margin-left: 10px; 
            font-size: 15px; -webkit-appearance: none; 
        }
        .head-icon { font-size: 24px; color: #5a70b3; cursor: pointer; padding: 4px; }
        .head-icon.heart { color: #ff5252; } 

        /* 하단 네비게이션 */
        #bottom-nav {
            position: absolute; bottom: 0; left: 0; width: 100%; z-index: 20;
            display: flex; justify-content: space-around; padding: 12px 0;
            background: #fff; border-top: 1px solid #eee; padding-bottom: calc(12px + env(safe-area-inset-bottom));
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #ccc; font-size: 11px; gap: 5px; cursor: pointer; }
        .nav-item.active { color: #5a70b3; }
        .nav-item i { font-size: 22px; }

        /* [홈 화면] */
        .keyword-container { padding: 20px; flex-shrink: 0; }
        .section-title { font-size: 16px; color: #333; margin-bottom: 12px; font-weight: 700; }
        .chip-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .chip { padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; cursor: pointer; }
        .chip.dark { background-color: #444; color: #fff; }
        .chip.light { background-color: #e8ebf5; color: #5a70b3; }
        
        /* 배너 영역 */
        .banner-wrapper { position: relative; width: 100%; margin-top: auto; margin-bottom: auto; padding: 0; overflow: hidden; }
        .banner-image { width: 100%; height: 357px; object-fit: cover; display: block; filter: brightness(0.7); }
        .banner-text { position: absolute; top: 20%; left: 30%; transform: translate(-50%, -50%); width: 100%; color: #fff; font-size: 24px; font-weight: 500; text-align: center; text-shadow: 0 4px 15px rgba(0,0,0,0.5); letter-spacing: -0.5px; z-index: 2; pointer-events: none; }

        /* [리스트 화면] */
        #listTitle { padding: 20px 20px 5px; font-size: 18px; font-weight: 800; color: #222; display: none; }
        .list-item { display: flex; padding: 15px 20px; border-bottom: 1px solid #f5f5f5; gap: 15px; cursor: pointer; position: relative;}
        .list-img { width: 90px; height: 90px; border-radius: 12px; object-fit: cover; flex-shrink: 0; background-color: #eee;}
        .list-info { flex: 1; display: flex; flex-direction: column; justify-content: center; overflow: hidden; padding-right: 30px;}
        .list-title { font-size: 16px; font-weight: 700; color: #222; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .list-addr { font-size: 13px; color: #777; line-height: 1.4; word-break: keep-all; }
        
        .like-btn { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); font-size: 24px; color: #ddd; padding: 10px; cursor: pointer; transition: color 0.2s; }
        .like-btn.liked { color: #ff5252; } 

        /* [지도 & 바텀시트] */
        #map-container { flex: 1; position: relative; width: 100%; height: 100%; }
        .map-back-btn { position: absolute; top: 20px; left: 20px; z-index: 100; background: #fff; width: 44px; height: 44px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.15); cursor: pointer; font-size: 20px; color: #333; }
        .bottom-sheet { position: absolute; bottom: -120%; left: 0; width: 100%; background: #fff; border-radius: 24px 24px 0 0; padding: 24px; box-shadow: 0 -4px 20px rgba(0,0,0,0.1); transition: bottom 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 200; display: flex; gap: 16px; cursor: pointer; }
        .bottom-sheet.show { bottom: 0; }
        .sheet-img { width: 80px; height: 80px; border-radius: 16px; object-fit: cover; flex-shrink:0;}
        .sheet-info { display: flex; flex-direction: column; justify-content: center; overflow:hidden;}
        .sheet-title { font-size: 17px; font-weight: 700; color: #222; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px;}
        .sheet-addr { font-size: 13px; color: #777; margin-bottom: 8px;}
        .sheet-link { font-size: 14px; color: #5a70b3; font-weight:700; }
        
        /* [상세 페이지] */
        .detail-header { position: relative; height: 300px; width: 100%; flex-shrink: 0;}
        .detail-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .detail-content { padding: 24px; }
        .detail-title { font-size: 24px; font-weight: 700; color: #111; margin-bottom: 10px; }
        .detail-addr { font-size: 14px; color: #666; margin-bottom: 24px; display: flex; align-items: center; gap: 6px;}
        .btn-reserve { width: 100%; padding: 16px; background: #5a70b3; color: #fff; border-radius: 12px; font-size: 16px; font-weight: 700; text-align: center; margin-bottom: 30px; cursor: pointer; box-shadow: 0 4px 10px rgba(90, 112, 179, 0.3); transition: transform 0.1s; }
        .btn-reserve:active { transform: scale(0.98); }
        .fac-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top:12px; }
        .fac-grid img { width: 100%; height: 130px; object-fit: cover; border-radius: 12px; }

        /* [예약 페이지] */
        .reserve-top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; border-bottom: 1px solid #eee; }
        .reserve-content { padding: 24px; }
        .form-group { margin-bottom: 24px; }
        .form-group label { display: block; font-size: 14px; font-weight: 700; color: #555; margin-bottom: 10px; }
        .reserve-input { width: 100%; padding: 14px 16px; border: 1px solid #e0e0e0; border-radius: 10px; font-size: 15px; outline: none; background: #fafafa; color: #333; appearance: none; }
        .reserve-input:focus { border-color: #5a70b3; background: #fff; }
        .bottom-fixed-btn {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px; 
            background: #222; color: #fff; font-size: 18px; font-weight: 700; text-align: center; cursor: pointer;
            padding-bottom: calc(20px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .hide-ui { opacity: 0; visibility: hidden; pointer-events: none; }
        .hide-nav { transform: translateY(100%); }
    </style>
</head>
<body>

<div id="app">
    <div id="common-header">
        <div class="header-search">
            <form class="search-box" onsubmit="handleSearchSubmit(event)">
                <i class="fas fa-search" style="color: #a0aabf;" onclick="handleSearchSubmit(event)"></i>
                <input type="search" id="searchInput" placeholder="캠핑장 이름을 검색해보세요">
            </form>
            <i class="fas fa-heart head-icon heart" onclick="showFavorites()"></i>
            <i class="fas fa-map head-icon" onclick="openMapScreen()"></i>
        </div>
    </div>

    <div id="screen-home" class="screen base-screen">
        <div class="scroll-area has-header has-nav">
            <div class="keyword-container">
                <div class="section-title">최근 검색어</div>
                <div class="chip-group" id="recentSearches"></div>
            </div>
            <div class="keyword-container">
                <div class="section-title">인기 테마</div>
                <div class="chip-group">
                    <div class="chip light" onclick="triggerSearch('차박');"># 차박명소</div>
                    <div class="chip light" onclick="triggerSearch('글램핑');"># 감성글램핑</div>
                    <div class="chip light" onclick="triggerSearch('계곡');"># 계곡캠핑</div>
                </div>
            </div>
            <div class="banner-wrapper">
                <img src="./images/image 3.png" alt="프로모션 배너" class="banner-image">
                <div class="banner-text">얼리버드 예약 <br> 30%할인 행사</div>
            </div>
        </div>
    </div>

    <div id="screen-list" class="screen">
        <div class="scroll-area has-header has-nav">
            <div id="listTitle">검색 결과</div>
            <div id="resultList"></div>
        </div>
    </div>

    <div id="screen-map" class="screen">
        <div id="map-container">
            <div class="map-back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></div>
            <div id="kakaoMap" style="width:100%; height:100%;"></div>
            <div class="bottom-sheet" id="mapBottomSheet"></div>
        </div>
    </div>

    <div id="screen-detail" class="screen">
        <div class="scroll-area" style="padding-bottom: 40px;">
            <div class="detail-header">
                <div class="map-back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></div>
                <img src="" class="detail-img" id="detailMainImg" alt="캠핑장">
            </div>
            <div class="detail-content">
                <div class="detail-title" id="detailTitle">캠핑장 이름</div>
                <div class="detail-addr"><i class="fas fa-map-marker-alt" style="color:#5a70b3;"></i> <span id="detailAddr">주소</span></div>
                
                <div class="btn-reserve" onclick="openReserveScreen()">예약하기</div>
                
                <div style="font-size: 18px; font-weight: 700; color: #222; margin-bottom: 5px;">시설 갤러리</div>
                <div class="fac-grid">
                    <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=300&q=80">
                    <img src="https://images.unsplash.com/photo-1550989460-0adf9ea622e2?auto=format&fit=crop&w=300&q=80">
                    <img src="./images/Frame 51.png" alt="">
                    <img src="./images/Frame 52.png" alt="">
                </div>
            </div>
        </div>
    </div>

    <div id="screen-reserve" class="screen">
        <div class="reserve-top-bar">
            <div style="font-size: 20px; cursor: pointer; padding: 5px;" onclick="goBack()"><i class="fas fa-arrow-left"></i></div>
            <div style="font-size: 17px; font-weight: 700;">예약하기</div>
            <div style="width: 24px;"></div>
        </div>

        <div class="scroll-area" style="padding-bottom: 80px;">
            <div class="reserve-content">
                <h2 id="reserveCampName" style="margin-bottom: 24px; color: #111; font-size: 22px;">캠핑장 이름</h2>
                
                <div class="form-group">
                    <label><i class="far fa-calendar-alt"></i> 캠핑 일정</label>
                    <div style="display:flex; gap: 10px; align-items: center;">
                        <input type="date" class="reserve-input" id="checkin">
                        <span style="font-weight: bold; color: #777;">~</span>
                        <input type="date" class="reserve-input" id="checkout">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-campground"></i> 사이트 유형 선택</label>
                    <select class="reserve-input">
                        <option value="">유형을 선택해주세요</option>
                        <option>파쇄석 사이트 (오토캠핑/차박가능)</option>
                        <option>데크 사이트 (텐트 전용)</option>
                        <option>노지 구역 (차박 전용)</option>
                        <option>감성 글램핑</option>
                    </select>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-users"></i> 이용 인원 및 차량</label>
                    <div style="display:flex; gap: 10px; margin-bottom:10px;">
                        <input type="number" class="reserve-input" placeholder="성인 (명)" min="1" value="2">
                        <input type="number" class="reserve-input" placeholder="아동 (명)" min="0" value="0">
                    </div>
                    <input type="number" class="reserve-input" placeholder="차량 (대)" min="1" value="1">
                    <p style="font-size: 12px; color: #888; margin-top: 8px;">* 기본 차량 1대 외 추가 차량은 현장 결제가 발생할 수 있습니다.</p>
                </div>
            </div>
        </div>
        <div class="bottom-fixed-btn" onclick="alert('예약이 성공적으로 완료되었습니다!\n즐거운 캠핑 되세요🏕️'); goHome();">예약 확정하기</div>
    </div>

    <div id="bottom-nav">
        <div class="nav-item active" onclick="goHome()"><i class="fas fa-home"></i><span>홈</span></div>
        <div class="nav-item" onclick="showFavorites()"><i class="far fa-heart"></i><span>찜</span></div>
        <div class="nav-item"><i class="far fa-user"></i><span>MY</span></div>
    </div>
</div>

<script>
    const GO_CAMPING_API_KEY = "7fb32307d1084916efd402f8c7df555b7c616c5148ff08a6ca84f0d350bd4572"; 
    let mapInstance = null;
    let currentHistory = ['screen-home'];
    let selectedCampForReserve = null;

    const dummyData = [
        { facltNm: "가평 별빛 오토캠핑장", addr1: "경기도 가평군 북면", mapY: 37.8812, mapX: 127.5492, firstImageUrl: "https://images.unsplash.com/photo-1523987355523-c7b5b0dd90a7?auto=format&fit=crop&w=300&q=80" },
        { facltNm: "평창 흥정계곡 캠핑장", addr1: "강원도 평창군 봉평면", mapY: 37.6167, mapX: 128.3223, firstImageUrl: "https://images.unsplash.com/photo-1537565266751-34fd38d100fb?auto=format&fit=crop&w=300&q=80" },
        { facltNm: "제주 애월 바당 캠핑장", addr1: "제주특별자치도 제주시 애월읍", mapY: 33.4623, mapX: 126.3197, firstImageUrl: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?auto=format&fit=crop&w=300&q=80" }
    ];

    window.onload = () => loadRecentSearches();

    function loadRecentSearches() {
        const history = JSON.parse(localStorage.getItem('camping_history') || '[]');
        const container = document.getElementById('recentSearches');
        container.innerHTML = '';
        history.forEach(keyword => {
            const chip = document.createElement('div');
            chip.className = 'chip dark';
            chip.textContent = keyword;
            chip.onclick = () => triggerSearch(keyword);
            container.appendChild(chip);
        });
    }

    // 💡 1. 폼(Form) 전송 이벤트 핸들러: 모바일 키보드 호환성 완벽 처리
    function handleSearchSubmit(e) {
        if(e) e.preventDefault(); // 기본 새로고침 방지
        const keyword = document.getElementById('searchInput').value.trim();
        if(keyword) {
            document.getElementById('searchInput').blur(); // 💡 키보드 강제로 내리기
            saveKeyword(keyword);
            searchCamping(keyword);
        }
    }

    // 💡 2. 칩셋 클릭 시 폼 전송 우회 처리
    function triggerSearch(keyword) {
        document.getElementById('searchInput').value = keyword;
        saveKeyword(keyword);
        searchCamping(keyword);
    }

    function saveKeyword(keyword) {
        let history = JSON.parse(localStorage.getItem('camping_history') || '[]');
        history = history.filter(item => item !== keyword);
        history.unshift(keyword);
        if(history.length > 5) history.pop();
        localStorage.setItem('camping_history', JSON.stringify(history));
        loadRecentSearches();
    }

    async function searchCamping(keyword) {
        // 💡 3. 예약페이지로 넘어가는 Z-index 버그 방지 (기존 열린 화면 강제 삭제)
        ['screen-map', 'screen-detail', 'screen-reserve'].forEach(id => {
            document.getElementById(id).classList.remove('active');
        });
        
        // 검색 화면(리스트)으로 히스토리 강제 지정
        currentHistory = ['screen-home']; 
        showScreen('screen-list');

        const listContainer = document.getElementById('resultList');
        document.getElementById('listTitle').style.display = 'none'; 
        listContainer.innerHTML = '<div style="padding:50px 20px; text-align:center; color:#777;">데이터를 불러오는 중입니다...</div>';

        if (GO_CAMPING_API_KEY === "YOUR_GO_CAMPING_API_KEY") {
            setTimeout(() => renderList(dummyData, false), 400);
            return;
        }

        try {
            const url = `https://apis.data.go.kr/B551011/GoCamping/searchList?numOfRows=20&pageNo=1&MobileOS=ETC&MobileApp=AppTest&serviceKey=${GO_CAMPING_API_KEY}&_type=json&keyword=${encodeURIComponent(keyword)}`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.response && data.response.body && data.response.body.items && data.response.body.items !== "") {
                let items = data.response.body.items.item;
                if (!Array.isArray(items)) items = [items]; 
                renderList(items, false);
            } else {
                listContainer.innerHTML = '<div style="padding:50px 20px; text-align:center; color:#777;">검색 결과가 없습니다.</div>';
            }
        } catch (error) {
            renderList(dummyData, false);
        }
    }

    function showFavorites() {
        let likes = JSON.parse(localStorage.getItem('liked_camps') || '[]');
        renderList(likes, true);
        showScreen('screen-list');
    }

    function renderList(items, isFavoriteView = false) {
        const listContainer = document.getElementById('resultList');
        const listTitle = document.getElementById('listTitle');
        listContainer.innerHTML = '';
        
        if(isFavoriteView) {
            listTitle.style.display = 'block';
            listTitle.textContent = `❤️ 내가 찜한 캠핑장 (${items.length})`;
        } else {
            listTitle.style.display = 'none';
        }

        if(items.length === 0) {
            listContainer.innerHTML = '<div style="padding:50px 20px; text-align:center; color:#777;">목록이 비어있습니다.</div>';
            return;
        }

        let likes = JSON.parse(localStorage.getItem('liked_camps') || '[]');

        items.forEach(item => {
            const isLiked = likes.some(c => c.facltNm === item.facltNm);
            const heartClass = isLiked ? 'fas fa-heart like-btn liked' : 'far fa-heart like-btn';
            
            const div = document.createElement('div');
            div.className = 'list-item';
            const imgUrl = item.firstImageUrl || "https://images.unsplash.com/photo-1478131143081-80f7f84ca84d?auto=format&fit=crop&w=150&q=80";
            
            div.innerHTML = `
                <img src="${imgUrl}" class="list-img" alt="썸네일">
                <div class="list-info">
                    <div class="list-title">${item.facltNm}</div>
                    <div class="list-addr">${item.addr1 || item.doNm + ' ' + item.sigunguNm}</div>
                </div>
                <i class="${heartClass}"></i>
            `;
            
            const likeBtn = div.querySelector('.like-btn');
            likeBtn.onclick = (e) => {
                e.stopPropagation(); 
                toggleLikeLogic(e.target, item);
            };

            div.onclick = () => openMapScreen(item);
            listContainer.appendChild(div);
        });
    }

    function toggleLikeLogic(targetEl, item) {
        let likes = JSON.parse(localStorage.getItem('liked_camps') || '[]');
        const index = likes.findIndex(c => c.facltNm === item.facltNm);

        if(index > -1) {
            likes.splice(index, 1);
            targetEl.className = 'far fa-heart like-btn';
        } else {
            likes.push(item);
            targetEl.className = 'fas fa-heart like-btn liked';
        }
        
        localStorage.setItem('liked_camps', JSON.stringify(likes));
        
        const listTitle = document.getElementById('listTitle');
        if (listTitle.style.display === 'block') {
            showFavorites(); 
        }
    }

    function openMapScreen(item = null) {
        showScreen('screen-map');
        if (typeof kakao === 'undefined' || !kakao.maps) return;

        const lat = item && item.mapY ? parseFloat(item.mapY) : 36.5; 
        const lng = item && item.mapX ? parseFloat(item.mapX) : 127.8;
        const targetPosition = new kakao.maps.LatLng(lat, lng);

        setTimeout(() => {
            const container = document.getElementById('kakaoMap');
            if(!mapInstance) {
                mapInstance = new kakao.maps.Map(container, { center: targetPosition, level: item ? 5 : 12 });
            } else {
                mapInstance.relayout();
                mapInstance.setCenter(targetPosition);
                mapInstance.setLevel(item ? 5 : 12);
            }
            if(item) {
                const marker = new kakao.maps.Marker({ position: targetPosition, map: mapInstance });
                kakao.maps.event.addListener(marker, 'click', () => openBottomSheet(item));
                openBottomSheet(item); 
            }
        }, 350); 
    }

    function openBottomSheet(item) {
        const sheet = document.getElementById('mapBottomSheet');
        const imgUrl = item.firstImageUrl || "https://images.unsplash.com/photo-1478131143081-80f7f84ca84d?auto=format&fit=crop&w=150&q=80";
        sheet.innerHTML = `
            <img src="${imgUrl}" class="sheet-img">
            <div class="sheet-info">
                <div class="sheet-title">${item.facltNm}</div>
                <div class="sheet-addr">${item.addr1}</div>
                <div class="sheet-link">상세페이지로 이동 ➔</div>
            </div>
        `;
        sheet.classList.add('show');
        sheet.onclick = () => openDetailScreen(item);
    }

    function openDetailScreen(item) {
        selectedCampForReserve = item; 
        showScreen('screen-detail');
        document.getElementById('mapBottomSheet').classList.remove('show'); 
        
        const imgUrl = item.firstImageUrl || "https://images.unsplash.com/photo-1478131143081-80f7f84ca84d?auto=format&fit=crop&w=800&q=80";
        document.getElementById('detailMainImg').src = imgUrl;
        document.getElementById('detailTitle').textContent = item.facltNm;
        document.getElementById('detailAddr').textContent = item.addr1;
    }

    function openReserveScreen() {
        if(!selectedCampForReserve) return;
        
        document.getElementById('reserveCampName').textContent = selectedCampForReserve.facltNm;
        
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);
        
        document.getElementById('checkin').value = today.toISOString().split('T')[0];
        document.getElementById('checkout').value = tomorrow.toISOString().split('T')[0];

        showScreen('screen-reserve');
    }

    function showScreen(screenId) {
        if(screenId !== 'screen-home') document.getElementById(screenId).classList.add('active');

        const header = document.getElementById('common-header');
        const nav = document.getElementById('bottom-nav');
        
        if(screenId === 'screen-map' || screenId === 'screen-detail' || screenId === 'screen-reserve') {
            header.classList.add('hide-ui'); nav.classList.add('hide-nav');
        } else {
            header.classList.remove('hide-ui'); nav.classList.remove('hide-nav');
        }
        if(currentHistory[currentHistory.length - 1] !== screenId) currentHistory.push(screenId);
    }

    function goBack() {
        if(currentHistory.length > 1) {
            const currentScreen = currentHistory.pop();
            document.getElementById(currentScreen).classList.remove('active');
            const prevScreen = currentHistory[currentHistory.length - 1];
            
            if(prevScreen === 'screen-map') document.getElementById('mapBottomSheet').classList.remove('show');
            
            const header = document.getElementById('common-header');
            const nav = document.getElementById('bottom-nav');
            if(prevScreen === 'screen-map' || prevScreen === 'screen-detail' || prevScreen === 'screen-reserve') {
                header.classList.add('hide-ui'); nav.classList.add('hide-nav');
            } else {
                header.classList.remove('hide-ui'); nav.classList.remove('hide-nav');
            }
        }
    }

    function goHome() {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        currentHistory = ['screen-home'];
        document.getElementById('common-header').classList.remove('hide-ui');
        document.getElementById('bottom-nav').classList.remove('hide-nav');
    }
</script>
</body>
</html>
