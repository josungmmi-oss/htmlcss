<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CAMBAK Splash Screen</title>
    <style>
        /* CSS: 디자인 및 레이아웃 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #ffffff; /* 깔끔한 화이트 배경 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* 스플래쉬 화면 전체 컨테이너 */
        .splash-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
        }

        /* 로고 영역 및 애니메이션 */
        .logo-wrapper {
            width: 200px; /* 로고 크기 조정 */
            margin-bottom: 40px;
            text-align: center;
            animation: fadeIn 1.2s ease-in-out;
        }

        .logo-wrapper img {
            width: 100%;
            height: auto;
        }

        /* 하단 로딩 바 스타일 */
        .loading-bar-container {
            width: 140px;
            height: 4px;
            background-color: #f0f0f0;
            border-radius: 2px;
            overflow: hidden;
            position: relative;
        }

        .loading-bar-fill {
            width: 0%;
            height: 100%;
            background-color: #0056b3; /* 로고 색상 계열 */
            border-radius: 2px;
            animation: progress 3s linear forwards;
        }

        /* 페이드인 효과 */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 진행 바 애니메이션 (3초 소요) */
        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="splash-container">
        <div class="logo-wrapper">
            <img src="./images/로고 2.png" alt="CAMBAK Logo">
        </div>

        <div class="loading-bar-container">
            <div class="loading-bar-fill"></div>
        </div>
    </div>

    <script>
        // JavaScript: 3초 후 이동 로직
        window.onload = function() {
            setTimeout(function() {
                // 3000ms(3초) 대기 후 네이버로 리다이렉트
                window.location.href = "./index.html";
            }, 3000);
        };
    </script>

</body>
</html>
