<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서객체선택(class)</title>
</head>
<body>
    <h1 class="txt">큰제목태그1</h1>
    <h1 class="txt">큰제목태그2</h1>
    <h1 class="txt">큰제목태그3</h1>
    <p class="ppp">첫 번째 문단입니다</p>

    <script>
        // getElementsByClassName("클래스이름")
        // 1. 문서객체 선택
        let tit = document.getElementsByClassName("txt");
        console.log(tit);

        tit[0].style.border = "5px solid red";
        tit[1].style.border = "5px solid blue";
        tit[2].style.border = "5px solid green";

        let p1 = document.getElementsByClassName("ppp");
        p1[0].style.border = "10px dotted black";
    </script>
</body>
</html>
