<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문서객체선택 응용</title>
</head>
<body>
    <h1>회원명단</h1>
    <ul>
        <li>홍길동</li>
        <li>한만종</li>
        <li>김흥부</li>
        <li>이놀부</li>
        <li>정정화</li>
        <li>강인구</li>
    </ul>
    <script>
    // 문서객체 선택
    let members = document.getElementsByTagName("li");

    // 홍길동
    members[0].style.color = "black";
    members[0].style.fontSize = "24px";
    members[0].style.backgroundColor = "yellow";

    // 한만종
    members[1].style.color = "white";
    members[1].style.backgroundColor = "orange";

    // 김흥부
    members[2].style.color = "black";
    members[2].style.fontSize = "24px";
    members[2].style.backgroundColor = "yellow";

    // 이놀부
    members[3].style.color = "white";
    members[3].style.backgroundColor = "orange";

    // 정정화
    members[4].style.color = "black";
    members[4].style.fontSize = "24px";
    members[4].style.backgroundColor = "yellow";

    // 강인구
    members[5].style.color = "white";
    members[5].style.backgroundColor = "orange";
</script>
    
</body>
</html>
