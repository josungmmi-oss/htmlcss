<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Card UI Box</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      min-height: 100vh;
      padding: 40px 0;
    }

    .card-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .card-list {
      display: flex;
      justify-content: center;
      gap: 24px;
      width: fit-content;
    }

    .card {
      width: 350px;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .card-image {
      width: 100%;
      height: 260px;
      background: #dfe6f3;
    }

    .card-body {
      padding: 42px 0;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 12px;
    }

    .card-label {
      font-size: 14px;
      font-weight: 700;
      color: #877abc;
      margin-bottom: 16px;
    }

    .card-text {
      font-size: 20px;
      line-height: 1.6;
      color: #111;
      font-weight: 700;
      letter-spacing: -1.5px;
      margin-bottom: 16px;
    }

    .card-price {
      font-size: 24px;
      font-weight: 900;
      color: #111827;
    }

    .card-price-unit {
      font-size: 16px;
      font-weight: 400;
    }
  </style>
</head>
<body>
  <div class="card-wrap">
    <div class="card-list">
      <div class="card">
        <div class="card-image"></div>
        <img src="./images/635713457277990389.JPG" alt="">
        <div class="card-body">
          <p class="card-label">패키지</p>
          <p class="card-text">[출발임박/Semi-프리미엄]장가계/원가계 5일 #천문호선쇼 #대협곡 유리다리+..</p>
          <p class="card-price">1,499,000<span class="card-price-unit">원~</span></p>
        </div>
      </div>

      <div class="card">
        <div class="card-image"></div>
        <div class="card-body">
          <p class="card-label">패키지</p>
          <p class="card-text">[출발임박/Semi-프리미엄]장가계/원가계 5일 #천문호선쇼 #대협곡 유리다리+..</p>
          <p class="card-price">1,499,000<span class="card-price-unit">원~</span></p>
        </div>
      </div>

      <div class="card">
        <div class="card-image"></div>
        <div class="card-body">
          <p class="card-label">패키지</p>
          <p class="card-text">[출발임박/Semi-프리미엄]장가계/원가계 5일 #천문호선쇼 #대협곡 유리다리+..</p>
          <p class="card-price">1,499,000<span class="card-price-unit">원~</span></p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
