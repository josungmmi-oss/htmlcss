<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>클릭이벤트 inline(this)</title>
</head>
<body>
    <!--inline 스타일-->
    <h1 style="font-size: 48px; color: red;">큰제목 태그</h1>
    <!--inline 스타일 이벤트-->
    <h1 onclick="this.style.color='blue'">자바스크립트용 큰제목</h1>
</body>
</html>
