<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매일 밤 10시 이벤트</title>
    <!-- 나눔고딕 & Oswald 폰트 불러오기 -->
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&family=Oswald:wght@500;700&display=swap" rel="stylesheet">
    <style>
        /* 기본 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nanum Gothic', sans-serif;
        }

        /* 전체 사이즈 (1600 * 1666) */
        .wrapper {
            width: 1600px;
            height: 1666px;
            background-color: #312a3d; /* 배경색 */
            margin: 0 auto;
            padding-top: 100px;
            position: relative;
        }

        /* 상단 텍스트 */
        .header-text {
            color: #ffffff;
            font-size: 44px;
            font-weight: 400;
            text-align: center;
            margin-bottom: 18px;
            letter-spacing: -1px;
        }

        /* 숫자 카운트 힌트 텍스트 */
        .timer-hint {
            color: #d11276;
            text-align: center;
            font-size: 20px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        /* 숫자 카운트 박스 (660 * 120) */
        .timer-wrapper {
            width: 660px;
            height: 120px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 48px;
        }

        .timer-group {
            display: flex;
            gap: 8px; /* 좁은 간격 w8 */
        }

        /* 넓은 간격 w46 */
        .timer-separator {
            width: 46px; 
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 15px;
        }

        /* 콜론 점 디자인 */
        .dot {
            width: 8px;
            height: 8px;
            background-color: #1e1826;
            border-radius: 50%;
        }

        /* 개별 숫자칸 (85 * 120) - border-radius: 4px 적용 */
        .digit-box {
            width: 85px;
            height: 120px;
            background: linear-gradient(to bottom, #251a35 50%, #473563 50%);
            color: #ffffff;
            font-family: 'Oswald', sans-serif;
            font-size: 90px;
            font-weight: 500;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px; /* 적용 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            padding-bottom: 5px;
        }

        .digit-box::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: #312a3d; 
            transform: translateY(-50%);
        }

        /* 초록 검색창 영역 */
        .search-area {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 30px;
            color: #aaa;
            font-size: 14px;
        }
        
        /* 검색 유도 박스 - border-radius: 4px 적용 */
        .search-box {
            display: inline-block;
            border: 2px solid #00c73c;
            background: #fff;
            padding: 5px 5px;
            width: 350px;
            height: 35px;
            text-align: left;
            color: #00c73c;
            font-weight: bold;
            margin-left: 6px;
            vertical-align: middle;
            border-radius: 4px; /* 적용 */
            margin: 20px;
        }

        /* 큰 박스 (950 * 1100) */
        .main-box {
            width: 950px;
            height: 1100px;
            background-color: #241d2e;
            margin: 0 auto;
            padding: 50px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 문제 텍스트 */
        .question {
            color: #ffffff;
            text-align: center;
            font-size: 20px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        /* 카드 박스 (740 * 680) */
        .card-container {
            width: 740px;
            height: 680px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(3, 230px);
            gap: 22px;
        }

        /* 개별 카드 (230 * 330) - border-radius: 4px 적용 */
        .card {
            width: 230px;
            height: 330px;
            background-color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            position: relative;
            cursor: pointer;
            border-radius: 4px; /* 적용 */
        }

        .card-title {
            font-size: 14px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 10px;
        }
.item-img {
    width: 150px;
    height: 150px;
    background-color: #f0f0f0;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    /* font-size: 12px; */
    border-radius: 4px;
    overflow: hidden; /* 영역을 벗어나는 이미지 숨김 */
}

.item-img img {
    width: 100%;
    height: 100%;
    object-fit: cover; /* 비율을 유지하며 영역을 가득 채움 */
    display: block;
}


        .stock {
            font-size: 16px;
            font-weight: 700;
        }
        .stock span {
            color: #7d2ae8;
        }

        /* 마감된 카드 처리 - border-radius: 4px 적용 */
        .card.sold-out {
            cursor: default;
        }
        .card.sold-out::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 4px; /* 적용 */
        }
        .sold-out-badge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background-color: rgba(125, 42, 232, 0.9);
            color: #fff;
            border-radius: 50%; /* 마감 배지는 원형 유지 */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            z-index: 10;
        }

        /* 하단 정답 입력창 & 응모 버튼 영역 */
        .form-area {
            width: 740px;
            margin: 30px auto 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 정답 입력창 - border-radius: 4px 적용 */
        .answer-input {
            width: 100%;
            height: 50px;
            padding: 0 20px;
            font-size: 16px;
            border: none;
            margin-bottom: 30px;
            outline: none;
            border-radius: 4px; /* 적용 */
        }

        /* 응모하기 버튼 - border-radius: 4px 적용 */
        .submit-btn {
            width: 520px;
            height: 60px;
            background-color: #6a1b9a;
            color: #fff;
            font-size: 20px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            margin: 20px auto 0; /* 요청사항: 위에서 20px 더 아래로 이동 (기본 margin-top 수정) */
            display: block;
            border-radius: 4px; /* 적용 */
            margin-top: 30px;
        }
        .submit-btn:hover {
            background-color: #8e24aa;
        }

        /* 라디오 버튼 커스텀 */
        input[type="radio"] {
            accent-color: #7d2ae8;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

    </style>
</head>
<body>

<div class="wrapper">
    <h1 class="header-text">매일 밤 10시 이벤트가 시작됩니다!</h1>
    
    <!-- <div class="timer-hint">숫자가 카운트 되도록 텍스트로 제작</div> -->
    
    <div class="timer-wrapper">
        <div class="timer-group">
            <div class="digit-box" id="h1">0</div>
            <div class="digit-box" id="h2">0</div>
        </div>
        
        <div class="timer-separator">
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
        <div class="timer-group">
            <div class="digit-box" id="m1">0</div>
            <div class="digit-box" id="m2">0</div>
        </div>
        
        <div class="timer-separator">
            <div class="dot"></div>
            <div class="dot"></div>
        </div>

        <div class="timer-group">
            <div class="digit-box" id="s1">0</div>
            <div class="digit-box" id="s2">0</div>
        </div>
    </div>

    <div class="search-area">
        회원님이 보다 빠르게 정답을 찾을 수 있도록
        <div class="search-box">초록 검색창을 띄워두세요! <span style="float: right; margin-top: 2px;">▼</span></div>
    </div>

    <div class="main-box">
        <p class="question">
            Q. 3월 13일 문제 : 커넥츠에서 등업을 하려면 어떤 신청을 해야 할까요?<br>
            (힌트 : 000신청 / 3글자)
        </p>

        <div class="card-container">
            <label class="card">
                <div class="card-title">소니 미러리스 A5100</div>
                <div class="item-img">
                    <img src="./images/1.jpg" alt="">
                </div>
                <div class="stock"><span>3</span>개 남음</div>
                <input type="radio" name="event_item" checked>
            </label>

            <div class="card sold-out">
                <div class="sold-out-badge">마감</div>
                <div class="card-title">신라호텔 더 파크 뷰 식사권 2인</div>
                <div class="item-img">
                    <img src="./images/2.jpg" alt="">
                </div>
                <div class="stock" style="color:#aaa;"><span>0</span>개 남음</div>
                <input type="radio" name="event_item" disabled>
            </div>

            <label class="card">
                <div class="card-title">외장하드 1TB</div>
                <div class="item-img">
                    <img src="./images/3.jpg" alt="">
                </div>
                <div class="stock"><span>10</span>개 남음</div>
                <input type="radio" name="event_item">
            </label>

            <label class="card">
                <div class="card-title">라미 만년필</div>
                <div class="item-img">
                    <img src="./images/4.png" alt="">
                </div>
                <div class="stock"><span>3</span>개 남음</div>
                <input type="radio" name="event_item">
            </label>

            <label class="card">
                <div class="card-title">백화점 상품권 1만원</div>
                <div class="item-img">
                    <img src="./images/5.jpg" alt="">
                </div>
                <div class="stock"><span>20</span>개 남음</div>
                <input type="radio" name="event_item">
            </label>

            <label class="card">
                <div class="card-title">바나나맛 우유</div>
                <div class="item-img">
                    <img src="./images/6.jpg">
                </div>
                <div class="stock"><span>100</span>개 남음</div>
                <input type="radio" name="event_item">
            </label>
        </div>

        <div class="form-area">
            <input type="text" class="answer-input" placeholder="정답 : 띄어쓰기까지 정확하게 입력해 주세요.">
            <button class="submit-btn">응모하기</button>
        </div>
    </div>
</div>

<script>
    function updateTimer() {
        const now = new Date();
        let targetTime = new Date();
        targetTime.setHours(22, 0, 0, 0);

        if (now > targetTime) {
            targetTime.setDate(targetTime.getDate() + 1);
        }

        const diff = Math.floor((targetTime - now) / 1000);

        const hours = Math.floor(diff / 3600);
        const minutes = Math.floor((diff % 3600) / 60);
        const seconds = diff % 60;

        const hStr = String(hours).padStart(2, '0');
        const mStr = String(minutes).padStart(2, '0');
        const sStr = String(seconds).padStart(2, '0');

        document.getElementById('h1').innerText = hStr[0];
        document.getElementById('h2').innerText = hStr[1];
        document.getElementById('m1').innerText = mStr[0];
        document.getElementById('m2').innerText = mStr[1];
        document.getElementById('s1').innerText = sStr[0];
        document.getElementById('s2').innerText = sStr[1];
    }

    setInterval(updateTimer, 1000);
    updateTimer();
</script>

</body>
</html>
