<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>삼양식품</title>
    <link rel="stylesheet" href="./css/style2.css">
</head>

<body>
    <section>
        <!-- 제목 영역 -->
        <div class="title">
            <h2>COMMUNITY</h2>
            <P>
                삼양식품은 혁신적인 기술과 포옹적인 사고로 여러분과 함께<br>
                새로운 식문화를 만들어갑니다.
            </P>
        </div>
        <!-- sns 들어갈 영역 -->
        <ul>
            <li><a href="#"><img src="./images/ico_facebook.png" alt="페북"></a></li>
            <li><a href="#"><img src="./images/ico_insta.png" alt="인스타"></a></li>
            <li><a href="#"><img src="./images/ico_blog.png" alt="블로그"></a></li>
            <li><a href="#"><img src="./images/ico_twitter.png" alt="트위터"></a></li>
        </ul>
        <!-- 박스모델 시작-제일 큰 부모요소 -->
    <div class="box_total_wrap">
        <!-- 왼쪽 박스 -->
        <div class="left"></div>
        <!-- 센터 박스 -->
        <div class="center">
            <div class="video">
            <h3>
                홍보영상
                <p>삼양식품의 다채로운 스토리를<br />영상으로 보여드립니다.</p>
                <button>자세히 보기</button>
            </h3>
            </div>
            <div class="cs">
            <h3>
                고객문의
                <p>삼양식품에게<br />여러분의 다양한 의견을 남겨주세요.</p>
                <button>자세히 보기</button>
            </h3>
            </div>
        </div>
        <!-- 오른쪽 박스 -->
        <div class="right">
            <div class="food">
            <h3>
                맛있는 나눔
                <p>모두가 행복한 맛있는 세상</p>
                <button>자세히 보기</button>
            </h3>
            </div>
            <div class="board">
            <h3>
                공지사항
                <p>삼양식품 개인정보취급방침 개정 안내</p>
                <button>자세히 보기</button>
            </h3>
            </div>
            <div class="mall">
            <h3>
                삼양식품 공식몰
                <p>
                삼양식품의<br />
                다양한제품을 만나보세요.
                </p>
                <button>자세히 보기</button>
            </h3>
            </div>
        </div>
        </div>
    </section>

</html>
