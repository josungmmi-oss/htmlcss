<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form태그</title>
    <link rel="stylesheet" href="./css/form.css">
</head>
<body>
    <h1>[폼구성 요소 알아보기]</h1>
    <!--데이터를 전송하는 방식 기본값은 get방식-->
    <!--데이터를 전송하는 방식 기본값은 post방식-->
    <form action="login.jsp" name="login" method="post">
        <fieldset>
            <legend>로그인화면</legend>
            <ol>
                <li>
                    <!--장애인을 위한 코딩(웹접근성 코딩)-->
                    <label for="idinput">ID</label>
                    <input type="text" class="idbox" name="id" id="idinput" placeholder="아이디또는전화번호"> 
                </li>
                <li>
                    <label for="pwbox">PASSWORD</label>
                    <input type="password" class="pw" name="pw" placeholder="비밀번호" id="pwbox">
                </li>
            </ol>
            
                
            </fieldset>
            <!--서버로 데이터를 전송 버튼. value에서 이름 바꿈-->
                <input type="submit" value="로그인">
                <!--입력한 data를 초기화 버튼-->
                <input type="reset" value="다시입력">
    </form>
          <form action="" name="my" method="post">
            <fieldset>
                <legend>개인신상정보</legend>
                <ul>
                    <li>
                        <!--'라디오버튼' 여러개 요소 중 하나만 선택시 사용(작명)-->
                        <input type="radio" name="gender" id="men"><label for="men">남자</label>
                        <input type="radio" name="gender" checked id="women"><label for="women">여자</label>
                    </li>
                    <li>
                        <label for="tour">여행</label>
                        <input type="checkbox" checke id="tour" name="chk" value="여행">
                        <label for="movie">영화</label> 
                        <input type="checkbox"  id="movie" name="chk2" value="영화">
                        <label for="book">독서</label> 
                        <input type="checkbox"  id="book" name="chk3" value="독서">
                    </li>
                    <li>
                        <label for="color">칼라선택</label>
                        <select name="colorlist" id="color">
                            <option value="">;;;;; 색상선택 ;;;;;</option>
                            <option value="빨강">빨간색</option>
                            <option value="초록">녹색</option>
                            <option value="파랑">파란색</option>
                        </select>
                    </li>
                    <li>
                        <label for="ms">message</label>
                        <!--여러줄 입력 받을때-->
                        <textarea name="msg" id="ms" cols="60" rows="20">문의 사항 작성</textarea> 
                    </li>
                    <li>
                        <label for="file">파일첨부</label>
                        <input type="file" id="" name="file">
                    </li>
                    <li><label for="">색상선택</label>
                        <input type="color" name="color" id="col">
                    </li>
                    <li>
                        <label for="ddd">예약날짜</label>
                        <input type="date" name="date" id="ddd">
                    </li>
                    <li>
                        <label for="time">예약시간</label>
                        <input type="time" name="time" id="time">
                    </li>
                    <li>
                        <label for="dt">날짜시간예약</label>
                        <input type="datetime-local" name="datetime" id="dt">
                    </li>
                    <li>
                        <label for="mi">리스트목록(다중선택)</label>
                        <select name="multiselect" id="ml" multiple >
                            <option value="">사이즈를 선택하세요</option>
                            <option value="44">44</option>
                            <option value="55">55</option>
                            <option value="66">66</option>
                            <option value="77">77</option>
                        </select>
                    </li>
                </ul>
            </fieldset>
            <input type="submit" value="가입" >
            <input type="reset" value="다시입력">
            
          </form>
</body>
</html>
