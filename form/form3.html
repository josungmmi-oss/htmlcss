<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form응용문제5</title>
    <link rel="stylesheet" href="./form3.html" />
  </head>
  <body>
    <form action="">
      <fieldset>
        <legend>신청과목</legend>
        <p>이 달에 신청할 과목을 선택하세요(1과목만 가능)</p>
        <input type="radio" name="subject" checked id="k1" /><label for="k1"
          >회화</label
        >
        <input type="radio" name="subject" id="k2" /><label for="k2"
          >문법</label
        >
        <input type="radio" name="subject" id="k3" /><label for="">작문</label>
      </fieldset>
      <fieldset>
        <legend>메일링</legend>
        <p>메일로 받고 싶은 뉴스 주제를 선택해 제수요(복수선택가능)</p>
        <input type="checkbox" name="k1" id="c1" /><label for="c1"
          >해외단신</label
        >
        <input type="checkbox" name="k2" id="c2" /><label for="c2"
          >5분 회화</label
        >
        <input type="checkbox" name="k3" id="c3" /><label for="c3"
          >모닝팝스</label
        >
      </fieldset>
    </form>
  </body>
</html>
