<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>form응용문제4</title>
    <link rel="stylesheet" href="./css/form5.css" />
  </head>
  <body>
    <div class="form-group">
      <label for="car-brand">자동차 브랜드 선택:</label>
      <select id="car-brand" name="car-brand" size="4">
        <option value="volvo">볼보</option>
        <option value="saab">싸브</option>
        <option value="fiat" selected>피아트</option>
        <option value="audi">아우디</option>
      </select>
    </div>
    <button type="submit" class="submit-btn">제출</button>
  </body>
</html>
