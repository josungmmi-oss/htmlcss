<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>함수응용2</title>
</head>
<body>
    <script>
    function bmi(name, height, weight) {
        let result = weight / (height * height / 10000);
        result = Math.floor(result);
        document.write(`${name}님의 체질량지수는 ${result}입니다<br>`);
    }

    bmi("홀쭉이", 160, 50);
    bmi("코린이", 170, 60);
    bmi("통통이", 180, 70);
</script>
</body>
</html>
