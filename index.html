<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM객체 제어</title>
</head>
<body>
    <ul id="list" > <!--class를 넣어도돼!-->
        <lavel for="" id="">출생월</lavel>
        <select name="" id="month">

        </select>
    </ul>
    <script>
        //ul을 자바로 가져올때 메모리 변수 기억
        let list =document.getElementById("list")
        console.log(list)
        let output = "";
        //지역변수
        for(let i = 1; i <= 100; i++) {
        output = output + `<li>data${i}</li>`;
        }
        list.innerHTML=output;
        let month = document.getElementById(month);
        console.log(month);
        //지역변수
        let output2 = "";
        for(let i = 1;i<=12;i++) {
        output2 = output2 +  `<option>${i}월</option>`
        }
        month.innerHTML=output2

    </script>
    <select id="year"></select>

<script>
    // select를 자바스크립트로 가져와서 메모리 변수에 기억
    let year = document.getElementById("year");
    console.log(year);

    // 지역변수
    let output3 = "";
    for (let i = 2026; i >= 1900; i--) {
        output3 = output3 + `<option>${i}년</option>`;
    }

    year.innerHTML = output3;
</script>
</body>
</html>
