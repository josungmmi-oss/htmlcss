<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM객체제어</title>
</head>
<body>


<select id="year"></select>
<select id="month"></select>
<select id="day"></select>

<script>
    // 출생년도 select 가져오기
    let year = document.getElementById("year");
    console.log(year);

    let output = "";
    for (let i = 2026; i >= 1900; i--) {
        output = output + `<option>${i}년</option>`;
    }
    year.innerHTML = output;

    // 출생월 select 가져오기
    let month = document.getElementById("month");
    console.log(month);

    let output2 = "";
    for (let i = 1; i <= 12; i++) {
        output2 = output2 + `<option>${i}월</option>`;
    }
    month.innerHTML = output2;

    // 출생일 select 가져오기
    let day = document.getElementById("day");
    console.log(day);

    let output3 = "";
    for (let i = 1; i <= 31; i++) {
        output3 = output3 + `<option>${i}일</option>`;
    }
    day.innerHTML = output3;
</script>
</body>
</html>
