<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>객체데이터 응용</title>
</head>
<body>
    <script>
  let book = {
  title: "소년이 온다",
  author: "한강",
  price: "13,500원",
  publisher: "창비",
  rating: 9.9
};

document.write(`책제목: ${book.title}<br>`);
document.write(`저자이름: ${book.author}<br>`);
document.write(`책 가격: ${book.price}<br>`);
document.write(`출간인: ${book.publisher}<br>`);
document.write(`평점: ${book.rating}`);
    </script>
</body>
</html>
