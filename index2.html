<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>familysite</title>
    <style>
        @charset "utf-8";

        body {
            font-family: "맑은 고딕", sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        li {
            list-style: none;
        }

        a {
            text-decoration: none;
        }

        button {
            border: none;
            background: none;
            cursor: pointer;
        }

        main {
            width: 100%;
            height: 600px;
            background: #2558ab;
        }

        footer {
            width: 100%;
            height: 120px;
            background: #f8f8f8;
            border-top: 1px solid #d6e0df;
        }

        footer .inner {
            width: 960px;
            height: 120px;
            margin: 0 auto;
            padding: 30px 0;
            display: flex;
            justify-content: flex-end;
        }

        footer .inner .family {
            position: relative;
        }

        footer .inner .family .list {
            position: absolute;
            left: 0;
            bottom: 60px;
            width: 144px;
            border: 1px solid #bed9ca;
            background: #fff;
            display: none;
        }

        footer .inner .family .list li {
            text-indent: 12px;
        }

        footer .inner .family .list li:hover {
            background: #575757;
        }

        footer .inner .family .list li a {
            display: block;
            font-size: 14px;
            color: #575757;
            line-height: 32px;
        }

        footer .inner .family .list li:hover a {
            color: #fff;
        }
    </style>
</head>
<body>
    <main></main>

    <footer>
        <div class="inner">
            <div class="family">
                <button type="button" id="familyBtn">
                    <img src="./images/image 4.png" alt="패밀리사이트">
                </button>

                <ul class="list" id="familyList">
                    <li><a href="#">winclass</a></li>
                    <li><a href="#">글로벌BK</a></li>
                    <li><a href="#">IBK경제연구소</a></li>
                    <li><a href="#">IBK블로그</a></li>
                    <li><a href="#">IBK경제연구소</a></li>
                    <li><a href="#">IBK스포츠단</a></li>
                    <li><a href="#">IBK경제연구소</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script>
        const familyBtn = document.getElementById("familyBtn");
        const familyList = document.getElementById("familyList");

        familyBtn.addEventListener("click", function () {
            if (familyList.style.display === "block") {
                familyList.style.display = "none";
            } else {
                familyList.style.display = "block";
            }
        });
    </script>
</body>
</html>
