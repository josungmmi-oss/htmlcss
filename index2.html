<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>jquery</title>
    
    <style>
         .box{
        width: 1200px;
        display: flex;
        gap: 20px;
    }
    .box div{
        width: 200px;
        height: 200px;
        border: 1px solid #000;
    }
    .orange{
        background: orange;
    }
    .lightblue{
        background: lightblue;
    }
    .lightpurple{ 
        background: #f132b2;
    }
    </style>
  
</head>
<body>
    <h1>jquery</h1>
    <button id="btn1">숨김</button>
    <button id="btn2">보이기</button>
    <button id="btn3">토글</button>
    <button id="btn4">늘리기</button>
    <button id="btn5">줄이기</button>
    <hr>

    <div class="box">
        <div class="orange">보이기/숨기기</div>
        <div class="lightblue">토글</div>
        <div class="lightpurple">가로/세로크기</div>
    </div>

    <script src="./js/jquery-4.0.0.js"></script>
    <script>
        $(function(){
            $("#btn1").click(function(){
                $(".orange").hide();
            });

            $("#btn2").click(function(){
                $(".orange").show();
            });

            $("#btn3").click(function(){
                $(".lightblue").toggle();
            });

            $("#btn4").click(function(){
                $(".lightpurple").css({
                    "width":"600px",
                    "height":"600px"
                });
            });

            $("#btn5").click(function(){
                $(".lightpurple").css({
                    "width":"200px",
                    "height":"200px"
                });
            });
        });
    </script>
</body>
</html>
